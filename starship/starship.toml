"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$username\
$hostname\
$git_branch\
$git_state\
$git_status\
$git_commit\
$aws\
$nodejs\
$python\
$rust\
$golang\
$docker_context\
$package\
$line_break\
$character"""

# Right side of the prompt
right_format = "$cmd_duration $time $battery"

add_newline = true

[character]
success_symbol = "[рҹҗҲвҖҚв¬ӣ->](bold #8D8442)"
error_symbol = "[рҹҗҲвҖҚв¬ӣ->](bold #822F36)"

[battery]
full_symbol = 'рҹ”Ӣ '
charging_symbol = 'вҡЎпёҸ '
discharging_symbol = 'рҹ’Җ '

[[battery.display]]
threshold = 15
style = 'bold #822F36'
discharging_symbol = 'рҹ’Җ '

[[battery.display]]
threshold = 30
style = 'bold #D56920'

[[battery.display]]
threshold = 100

[directory]
style = "#9D7CD8 bold"
format = "[ ]($style)[$path]($style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " "
read_only_style = "#822F36"

[username]
style_user = "#8D8442 bold"
style_root = "#822F36 bold"
format = '[\[$user\]]($style)' #Remove '\[' or '\]' if you do not want brackets
show_always = true

[hostname]
format = "[@$hostname:](#8D8442 bold)"
ssh_only = true

[git_branch]
symbol = " "
style = "#9D7CD8 bold"
format = '[$symbol$branchВ·]($style)'

[git_status]
style = "#9D7CD8 bold"
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'

[git_commit]
style = "#9D7CD8 bold"
commit_hash_length = 4
tag_symbol = 'рҹ”– '

[git_state]
style = "#9D7CD8 bold"
format = '\([$state( $progress_current of $progress_total)]($style)\) '

[nodejs]
symbol = "в¬ў "
style = "#8D8442"
format = "[$symbol($version)]($style) "

[lua]
format = 'via [рҹҢ• $version](bold #9D7CD8) '

[python]
symbol = " "
style = "#9D7CD8"
format = "[$symbol($version)]($style) "

[rust]
symbol = "рҹҰҖ "
style = "#822F36"
format = "[$symbol($version)]($style) "

[golang]
symbol = " "
style = "#A88E71"
format = "[$symbol($version)]($style) "

[docker_context]
symbol = "рҹҗі "
style = "#9D7CD8 bold"
format = "[$symbol$context]($style) "

[terraform]
format = '[рҹҸҺрҹ’Ё $workspace]($style) '

[aws]
format = "on [$symbol($profile)(($region))]($style) "
symbol = "  "
style = "bold #D56920"
disabled = true
[aws.region_aliases]
ap-southeast-2 = 'au'
us-east-1 = 'va'

[azure]
disabled = false
format = "on [$symbol($username)]($style) "
symbol = "у° … "
style = "#9D7CD8 bold"

[package]
symbol = "рҹ“Ұ "
style = "#D56920 bold"
format = "[$symbol$version]($style) "

# [cmd_duration]
# disabled = false
# show_notifications = true
# min_time_to_notify = 3_000
# min_time = 1_0
# show_milliseconds = true
# format = '[вҸұ $duration]($style) '
# style = "#D56920 bold"

[time]
disabled = false
time_format = "%e-%B-%Y %R"                            # Hour:Minute Format
style = "bg:#202825"
format = '[[  $time ](fg:#A88E71 bg:#202825)]($style)'

[memory_usage]
symbol = "у°Қӣ "
format = '\[$symbol[$ram( | $swap)]($style)\]'

[os]
format = '\[[$symbol]($style)\]'

[status]
format = '[$symbol$common_meaning$signal_name]($style) '
style = '#9D7CD8'
symbol = 'вқҢ'
success_symbol = 'рҹҹў'
not_executable_symbol = 'рҹҡ«'
not_found_symbol = 'рҹ”Қ'
sigint_symbol = 'рҹ§ұ'
signal_symbol = 'вҡЎ'
disabled = false
