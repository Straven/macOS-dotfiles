include ~/.config/kitty/themes/tokyo-night-flash-goddess-storm.conf

background_opacity 0.75

shell "/opt/homebrew/bin/nu" --login --interactive

startup_session ~/.config/kitty/sessions/startup.conf

allow_remote_control yes

font_size 15
font_family FiraCode Nerd Font Retina

modify_font cell_width 95%
modify_font cell_height -2px

scrollback_lines 10000

hide_window_decorations titlebar-only
window_padding_width 5 5 0 0
cursor #DED09F
cursor_text_color #24283b

confirm_os_window_close 0

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# ============================================================
# Keybindings — Ctrl+a prefix (ported from Zellij config.kdl)
# ============================================================
# Send literal Ctrl+A to terminal (readline line-start / nu)
map ctrl+a>ctrl+a send_text normal \x01

# Focus navigation (vim-style)
map ctrl+a>h neighboring_window left
map ctrl+a>j neighboring_window down
map ctrl+a>k neighboring_window up
map ctrl+a>l neighboring_window right

# Splits
map ctrl+a>| launch --location=vsplit
map ctrl+a>- launch --location=hsplit

# Tabs
map ctrl+a>c new_tab
map ctrl+a>n next_tab
map ctrl+a>p previous_tab
map ctrl+a>1 goto_tab 1
map ctrl+a>2 goto_tab 2
map ctrl+a>3 goto_tab 3
map ctrl+a>4 goto_tab 4
map ctrl+a>5 goto_tab 5

# Close window/pane
map ctrl+a>x close_window
map ctrl+a>q close_window

# Scrollback
map ctrl+a>[ show_scrollback

# Session / window picker (fzf overlay)
map ctrl+a>s launch --type=overlay /opt/homebrew/bin/nu ~/.config/kitty/scripts/session-picker.nu

# Resize (Shift variants)
map ctrl+a>H resize_window narrower 5
map ctrl+a>J resize_window shorter 5
map ctrl+a>K resize_window taller 5
map ctrl+a>L resize_window wider 5

# Reload config
map ctrl+shift+r load_config_file
