# startup.conf
# All tabs opened at launch. Homescreen is first = active on start.

# ── Tab 1: homescreen ────────────────────────────────────────────────────────
new_tab homescreen
layout splits

launch --title btop /opt/homebrew/bin/btop
launch --title fastfetch --location=before --hold fastfetch --logo-type kitty-direct
launch --title shell --location=hsplit --keep-focus /opt/homebrew/bin/nu --login --interactive

# ── Tab 2: dotfiles › editor ─────────────────────────────────────────────────
new_tab dotfiles:editor
layout splits

launch --title nvim --bias 80 --cwd /Users/mykolasarry/Library/CloudStorage/OneDrive-Personal/StravenConfigs/dotfiles/macos-dotfiles /opt/homebrew/bin/nvim .
launch --title shell --location=hsplit --cwd /Users/mykolasarry/Library/CloudStorage/OneDrive-Personal/StravenConfigs/dotfiles/macos-dotfiles /opt/homebrew/bin/nu --login --interactive

# ── Tab 3: dotfiles › git ────────────────────────────────────────────────────
new_tab dotfiles:git
layout splits

launch --title git --cwd /Users/mykolasarry/Library/CloudStorage/OneDrive-Personal/StravenConfigs/dotfiles/macos-dotfiles /opt/homebrew/bin/nu --login --interactive

# ── Tab 4: yazi ──────────────────────────────────────────────────────────────
new_tab yazi
layout splits

launch --title yazi /opt/homebrew/bin/nu --login --interactive --execute "yazi"

# ── Tab 5: shell ─────────────────────────────────────────────────────────────
new_tab shell
layout splits

launch --title shell /opt/homebrew/bin/nu --login --interactive
