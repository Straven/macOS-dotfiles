# homescreen.conf
# Layout: fastfetch (top-left) | shell (bottom-left) | btop (right, full height)
#
# Build order:
# 1. btop fills screen first
# 2. fastfetch launches --location=before (pushes btop right, takes left column full height)
# 3. nu shell --location=hsplit (splits fastfetch pane: fastfetch top-left, shell bottom-left)
#
# Result:
# +----------+-------+
# | fastfetch| btop  |
# +----------+       |
# |    nu    |       |
# +----------+-------+

new_tab homescreen
layout splits

launch --title btop /opt/homebrew/bin/btop
launch --title fastfetch --location=before --hold fastfetch --logo-type kitty-direct
launch --title shell --location=hsplit --keep-focus /opt/homebrew/bin/nu --login --interactive
