# registra.conf
# Registra project workspace:
#   Tab 1: editor — nvim (top 80%) + shell (bottom 20%)
#   Tab 2: git    — plain shell

# ── Tab 1: editor ────────────────────────────────────────────────────────────
new_tab editor
layout splits

launch --title nvim --bias 80 --cwd /Users/mykolasarry/Projects/registra /opt/homebrew/bin/nvim .
launch --title shell --location=hsplit --cwd /Users/mykolasarry/Projects/registra /opt/homebrew/bin/nu --login --interactive

# ── Tab 2: git ────────────────────────────────────────────────────────────────
new_tab git
layout splits

launch --title git --cwd /Users/mykolasarry/Projects/registra /opt/homebrew/bin/nu --login --interactive
